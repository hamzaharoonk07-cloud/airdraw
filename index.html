<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Air Draw | Skeletal Engine</title>
    
    <!-- MediaPipe Core Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    
    <style>
        body {
            margin: 0;
            background: #050505;
            color: white;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        /* Top Control Bar */
        #toolbar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            border-radius: 50px;
            display: flex;
            gap: 20px;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .tool-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #888; }

        /* Color Buttons */
        .color-palette { display: flex; gap: 8px; }
        .color-swatch {
            width: 24px; height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .color-swatch.active { border-color: white; transform: scale(1.2); }

        /* Canvas Layers */
        canvas, video {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror Mode */
        }

        #video-feed { z-index: 1; opacity: 0.2; filter: grayscale(1); }
        #draw-canvas { z-index: 2; }
        #skeleton-canvas { z-index: 3; pointer-events: none; }

        /* Interaction Status */
        #status-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            padding: 8px 20px;
            border-radius: 20px;
            background: rgba(0,0,0,0.6);
            font-weight: 600;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        input[type="range"] { accent-color: #ffffff; cursor: pointer; }
        button#clear-btn {
            background: #ff3b30;
            border: none; color: white;
            padding: 6px 15px; border-radius: 15px;
            font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <div class="tool-group">
            <span class="label">Color</span>
            <div class="color-palette" id="palette">
                <div class="color-swatch active" style="background: #00f2ff;" data-color="#00f2ff"></div>
                <div class="color-swatch" style="background: #ff007f;" data-color="#ff007f"></div>
                <div class="color-swatch" style="background: #39ff14;" data-color="#39ff14"></div>
                <div class="color-swatch" style="background: #ffff00;" data-color="#ffff00"></div>
                <div class="color-swatch" style="background: #ffffff;" data-color="#ffffff"></div>
            </div>
        </div>
        <div class="tool-group">
            <span class="label">Size</span>
            <input type="range" id="brush-size" min="2" max="30" value="8">
        </div>
        <button id="clear-btn">RESET</button>
    </div>

    <div id="status-indicator">INITIALIZING SENSORS...</div>

    <video id="video-feed" playsinline></video>
    <canvas id="draw-canvas"></canvas>
    <canvas id="skeleton-canvas"></canvas>

    <script>
        const videoElement = document.getElementById('video-feed');
        const drawCanvas = document.getElementById('draw-canvas');
        const dctx = drawCanvas.getContext('2d');
        const skeletonCanvas = document.getElementById('skeleton-canvas');
        const sctx = skeletonCanvas.getContext('2d');
        const status = document.getElementById('status-indicator');

        let currentColor = "#00f2ff";
        let lastX = null;
        let lastY = null;

        function resize() {
            [drawCanvas, skeletonCanvas].forEach(c => {
                c.width = window.innerWidth;
                c.height = window.innerHeight;
            });
        }
        window.addEventListener('resize', resize);
        resize();

        // Color Picker Logic
        document.querySelectorAll('.color-swatch').forEach(swatch => {
            swatch.onclick = () => {
                document.querySelector('.color-swatch.active').classList.remove('active');
                swatch.classList.add('active');
                currentColor = swatch.dataset.color;
            };
        });

        document.getElementById('clear-btn').onclick = () => dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);

        function onResults(results) {
            // Clear skeleton frame every update
            sctx.clearRect(0, 0, skeletonCanvas.width, skeletonCanvas.height);

            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                status.innerText = "✋ PLACE HAND IN VIEW";
                lastX = null; lastY = null;
                return;
            }

            for (const landmarks of results.multiHandLandmarks) {
                // Draw Skeletal Structure
                drawConnectors(sctx, landmarks, HAND_CONNECTIONS, {color: '#ffffff', lineWidth: 2});
                drawLandmarks(sctx, landmarks, {color: currentColor, lineWidth: 1, radius: 3});

                const indexTip = landmarks[8];
                const indexPip = landmarks[6];
                const middleTip = landmarks[12];
                const thumbTip = landmarks[4];
                
                const x = indexTip.x * drawCanvas.width;
                const y = indexTip.y * drawCanvas.height;

                // --- GESTURE ENGINE ---
                // 1. Draw Gesture: Index finger up, Middle finger down
                const isDrawing = indexTip.y < indexPip.y && middleTip.y > landmarks[9].y;
                
                // 2. Erase Gesture: Open Palm (Index and Middle both up)
                const isErasing = indexTip.y < indexPip.y && middleTip.y < landmarks[10].y;

                // 3. Pause Gesture: Fist (Index and Middle both tucked)
                const isPaused = indexTip.y > indexPip.y && middleTip.y > landmarks[10].y;

                if (isPaused) {
                    status.innerText = "⏸️ SYSTEM PAUSED";
                    lastX = null; lastY = null;
                } 
                else if (isErasing) {
                    status.innerText = "🧼 ERASER ACTIVE";
                    dctx.globalCompositeOperation = 'destination-out';
                    drawStroke(x, y, 50);
                } 
                else if (isDrawing) {
                    status.innerText = "✏️ DRAWING MODE";
                    dctx.globalCompositeOperation = 'source-over';
                    drawStroke(x, y, document.getElementById('brush-size').value);
                }

                lastX = x;
                lastY = y;
            }
        }

        function drawStroke(x, y, size) {
            if (lastX === null) { lastX = x; lastY = y; return; }

            dctx.beginPath();
            dctx.moveTo(lastX, lastY);
            dctx.lineTo(x, y);
            dctx.strokeStyle = currentColor;
            dctx.lineWidth = size;
            dctx.lineCap = 'round';
            dctx.lineJoin = 'round';
            
            // Neon Effect
            dctx.shadowBlur = size / 2;
            dctx.shadowColor = currentColor;
            
            dctx.stroke();
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.8,
            minTrackingConfidence: 0.8
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });

        camera.start();
    </script>
</body>
</html>
