<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Air Draw | Particle Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            background: #050505;
            color: #fff;
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            z-index: 100;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 25px;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .control-group { display: flex; flex-direction: column; gap: 5px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #888; }

        canvas, video {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #video-feed { opacity: 0.15; filter: grayscale(100%) contrast(150%); }
        
        #status-pill {
            position: absolute;
            bottom: 30px;
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            font-weight: 600;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        input[type="range"] { accent-color: #00f2ff; }
        button { background: #ff3b3b; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="control-group">
            <label>Aura Color</label>
            <input type="color" id="colorPicker" value="#00f2ff">
        </div>
        <div class="control-group">
            <label>Energy Intensity</label>
            <input type="range" id="sizeSlider" min="5" max="40" value="15">
        </div>
        <div class="control-group">
            <label>Rainbow Mode</label>
            <input type="checkbox" id="rainbowMode">
        </div>
        <button id="clearBtn">WIPE CANVAS</button>
    </div>

    <div id="status-pill">INITIALIZING AI...</div>

    <video id="video-feed"></video>
    <canvas id="mainCanvas"></canvas>

    <script>
        const video = document.getElementById('video-feed');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const statusPill = document.getElementById('status-pill');
        
        let particles = [];
        let hue = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color, size) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.color = color;
                this.speedX = (Math.random() - 0.5) * 3;
                this.speedY = (Math.random() - 0.5) * 3;
                this.opacity = 1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.opacity -= 0.015;
                if (this.size > 0.5) this.size -= 0.1;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function onResults(results) {
            // Fade effect for the trail "ghosting"
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(5, 5, 5, 0.1)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                statusPill.innerText = "✋ SHOW HAND TO START";
                return;
            }

            const landmarks = results.multiHandLandmarks[0];
            const indexTip = landmarks[8];
            const x = indexTip.x * canvas.width;
            const y = indexTip.y * canvas.height;

            // Gesture Logic
            const isFist = indexTip.y > landmarks[5].y && landmarks[12].y > landmarks[9].y;
            const isOpenPalm = indexTip.y < landmarks[5].y && landmarks[20].y < landmarks[17].y;

            if (isFist) {
                statusPill.innerText = "⏸️ PAUSED";
                statusPill.style.borderColor = "orange";
            } else if (isOpenPalm) {
                statusPill.innerText = "🧼 ERASING";
                statusPill.style.borderColor = "red";
                // Exploding eraser effect
                for(let i=0; i<5; i++) particles.push(new Particle(x, y, '#ff0000', 20));
                ctx.globalCompositeOperation = 'destination-out';
                ctx.arc(x, y, 50, 0, Math.PI * 2);
                ctx.fill();
            } else {
                statusPill.innerText = "✨ CREATING";
                statusPill.style.borderColor = "#00f2ff";
                
                let color = document.getElementById('rainbowMode').checked 
                    ? `hsl(${hue}, 100%, 50%)` 
                    : document.getElementById('colorPicker').value;
                
                // Add new particles at finger tip
                for(let i=0; i<3; i++) {
                    particles.push(new Particle(x, y, color, document.getElementById('sizeSlider').value / 2));
                }
                hue++;
            }

            // Update and draw all particles
            particles.forEach((p, index) => {
                p.update();
                p.draw();
                if (p.opacity <= 0) particles.splice(index, 1);
            });
        }

        document.getElementById('clearBtn').onclick = () => {
            particles = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        };

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        hands.onResults(onResults);

        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({image: video}); },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
