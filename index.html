<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Air Draw - Pro Edition</title>
    <!-- MediaPipe Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        :root { --neon-blue: #00f2ff; }
        body { margin: 0; background: #050505; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Side UI Panel */
        #side-panel {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(15, 15, 15, 0.85); padding: 20px; border-radius: 20px;
            border: 1px solid #333; backdrop-filter: blur(12px);
            display: flex; flex-direction: column; gap: 20px; width: 60px; align-items: center;
        }

        .palette { display: flex; flex-direction: column; gap: 12px; }
        .swatch {
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer;
            border: 3px solid transparent; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .swatch:hover { transform: scale(1.15); }
        .swatch.active { border-color: white; transform: scale(1.1); box-shadow: 0 0 15px currentColor; }

        #size-container { writing-mode: bt-lr; height: 150px; display: flex; align-items: center; }
        input[type="range"] { height: 150px; -webkit-appearance: slider-vertical; cursor: pointer; }

        canvas, video { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); }
        #drawCanvas { z-index: 2; }
        #skeletonCanvas { z-index: 3; pointer-events: none; opacity: 0.8; }
        video { z-index: 1; opacity: 0.25; filter: grayscale(100%); }

        .status-bar {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; padding: 10px 30px; border-radius: 50px;
            background: rgba(0,0,0,0.6); font-weight: 800; text-transform: uppercase;
            letter-spacing: 2px; border: 1px solid #444; font-size: 0.9rem;
        }

        .clear-btn {
            background: #ff3333; color: white; border: none; padding: 10px;
            border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 0.7rem;
        }
    </style>
</head>
<body>

    <div id="side-panel">
        <div class="palette" id="colorPalette">
            <div class="swatch active" style="background: #00f2ff; color: #00f2ff;" data-color="#00f2ff"></div>
            <div class="swatch" style="background: #ff007b; color: #ff007b;" data-color="#ff007b"></div>
            <div class="swatch" style="background: #00ff40; color: #00ff40;" data-color="#00ff40"></div>
            <div class="swatch" style="background: #ffff00; color: #ffff00;" data-color="#ffff00"></div>
            <div class="swatch" style="background: #9d00ff; color: #9d00ff;" data-color="#9d00ff"></div>
            <div class="swatch" style="background: #ffffff; color: #ffffff;" data-color="#ffffff"></div>
        </div>
        <div id="size-container">
            <input type="range" id="sizeSlider" min="2" max="30" value="8" step="1">
        </div>
        <button class="clear-btn" onclick="clearCanvas()">CLEAR</button>
    </div>

    <div class="status-bar" id="statusLabel">Initializing AI...</div>

    <video id="inputVideo" playsinline></video>
    <canvas id="drawCanvas"></canvas>
    <canvas id="skeletonCanvas"></canvas>

    <script>
        const video = document.getElementById('inputVideo');
        const drawCanvas = document.getElementById('drawCanvas');
        const skelCanvas = document.getElementById('skeletonCanvas');
        const dctx = drawCanvas.getContext('2d');
        const sctx = skelCanvas.getContext('2d');
        const statusLabel = document.getElementById('statusLabel');
        const sizeSlider = document.getElementById('sizeSlider');

        let activeColor = "#00f2ff";
        let lastPos = { x: 0, y: 0 };
        let isDrawing = false;

        // Color Selection Logic
        document.querySelectorAll('.swatch').forEach(swatch => {
            swatch.addEventListener('click', () => {
                document.querySelector('.swatch.active').classList.remove('active');
                swatch.classList.add('active');
                activeColor = swatch.dataset.color;
                statusLabel.style.borderColor = activeColor;
            });
        });

        function resize() {
            drawCanvas.width = skelCanvas.width = window.innerWidth;
            drawCanvas.height = skelCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function clearCanvas() { dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height); }

        function onResults(results) {
            sctx.clearRect(0, 0, skelCanvas.width, skelCanvas.height);

            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                statusLabel.innerText = "Hand not visible";
                isDrawing = false;
                return;
            }

            for (const landmarks of results.multiHandLandmarks) {
                // Render the Skeleton
                drawConnectors(sctx, landmarks, HAND_CONNECTIONS, {color: '#ffffff55', lineWidth: 3});
                drawLandmarks(sctx, landmarks, {color: activeColor, lineWidth: 1, radius: 4});

                const indexTip = landmarks[8]; // Index Finger Tip
                const x = indexTip.x * drawCanvas.width;
                const y = indexTip.y * drawCanvas.height;

                // Gesture Definitions
                const isIndexExtended = landmarks[8].y < landmarks[6].y;
                const isMiddleExtended = landmarks[12].y < landmarks[10].y;
                const isPinkyExtended = landmarks[20].y < landmarks[18].y;

                // 1. ERASE: Open Palm (Index, Middle, and Pinky are up)
                if (isIndexExtended && isMiddleExtended && isPinkyExtended) {
                    statusLabel.innerText = "Mode: Eraser";
                    dctx.globalCompositeOperation = 'destination-out';
                    draw(x, y, 50); 
                } 
                // 2. PAUSE: Closed Fist (Index is down)
                else if (!isIndexExtended) {
                    statusLabel.innerText = "Mode: Paused (Fist)";
                    isDrawing = false;
                }
                // 3. DRAW: Index Up Only
                else {
                    statusLabel.innerText = "Mode: Drawing";
                    dctx.globalCompositeOperation = 'source-over';
                    draw(x, y, sizeSlider.value);
                }

                lastPos = { x, y };
            }
        }

        function draw(x, y, brushSize) {
            if (!isDrawing) {
                isDrawing = true;
                lastPos = { x, y };
                return;
            }
            dctx.beginPath();
            dctx.moveTo(lastPos.x, lastPos.y);
            dctx.lineTo(x, y);
            dctx.strokeStyle = activeColor;
            dctx.lineWidth = brushSize;
            dctx.lineCap = 'round';
            dctx.lineJoin = 'round';
            
            // Neon Glow
            dctx.shadowBlur = 15;
            dctx.shadowColor = activeColor;
            
            dctx.stroke();
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.75,
            minTrackingConfidence: 0.75
        });

        hands.onResults(onResults);

        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({image: video}); },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
