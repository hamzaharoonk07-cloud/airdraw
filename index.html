<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Air Draw - Multi-Tone Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Side UI Panel */
        #side-panel {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(10, 10, 10, 0.9); padding: 15px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px);
            display: flex; flex-direction: column; gap: 15px; width: 50px; align-items: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .palette { display: flex; flex-direction: column; gap: 10px; }
        .swatch {
            width: 32px; height: 32px; border-radius: 10px; cursor: pointer;
            border: 2px solid transparent; transition: all 0.2s ease;
            position: relative;
        }
        .swatch:hover { transform: scale(1.1); }
        .swatch.active { 
            border-color: white; 
            box-shadow: 0 0 15px currentColor;
            transform: scale(1.1);
        }
        /* Tick indicator for multi-select */
        .swatch.active::after {
            content: '✓'; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); color: white; font-size: 12px; font-weight: bold;
        }

        #size-container { writing-mode: bt-lr; height: 120px; display: flex; align-items: center; }
        input[type="range"] { -webkit-appearance: slider-vertical; width: 8px; height: 100px; cursor: pointer; }

        canvas, video { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); }
        #drawCanvas { z-index: 2; }
        #skeletonCanvas { z-index: 3; pointer-events: none; opacity: 0.6; }
        video { z-index: 1; opacity: 0.2; filter: contrast(120%) brightness(80%); }

        .status-bar {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; padding: 12px 25px; border-radius: 50px;
            background: rgba(20, 20, 20, 0.8); font-weight: 700; text-transform: uppercase;
            letter-spacing: 1.5px; border: 1px solid #333; font-size: 0.8rem;
            transition: border-color 0.3s;
        }

        .clear-btn {
            background: #222; color: #ff4444; border: 1px solid #ff4444; padding: 8px;
            border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 0.6rem;
            transition: all 0.2s;
        }
        .clear-btn:hover { background: #ff4444; color: white; }
    </style>
</head>
<body>

    <div id="side-panel">
        <div class="palette" id="colorPalette">
            <!-- Expanded Neon Colors -->
            <div class="swatch active" style="background: #00f2ff;" data-color="#00f2ff"></div> <!-- Cyber Cyan -->
            <div class="swatch" style="background: #ff007b;" data-color="#ff007b"></div> <!-- Neon Pink -->
            <div class="swatch" style="background: #00ff40;" data-color="#00ff40"></div> <!-- Electric Lime -->
            <div class="swatch" style="background: #ffff00;" data-color="#ffff00"></div> <!-- Laser Yellow -->
            <div class="swatch" style="background: #9d00ff;" data-color="#9d00ff"></div> <!-- Proto Purple -->
            <div class="swatch" style="background: #ff4d00;" data-color="#ff4d00"></div> <!-- Blaze Orange -->
            <div class="swatch" style="background: #0044ff;" data-color="#0044ff"></div> <!-- Deep Cobalt -->
            <div class="swatch" style="background: #ffffff;" data-color="#ffffff"></div> <!-- Pure White -->
        </div>
        <div id="size-container">
            <input type="range" id="sizeSlider" min="2" max="40" value="10" step="1">
        </div>
        <button class="clear-btn" onclick="clearCanvas()">CLEAR</button>
    </div>

    <div class="status-bar" id="statusLabel">Initializing AI...</div>

    <video id="inputVideo" playsinline></video>
    <canvas id="drawCanvas"></canvas>
    <canvas id="skeletonCanvas"></canvas>

    <script>
        const video = document.getElementById('inputVideo');
        const drawCanvas = document.getElementById('drawCanvas');
        const skelCanvas = document.getElementById('skeletonCanvas');
        const dctx = drawCanvas.getContext('2d');
        const sctx = skelCanvas.getContext('2d');
        const statusLabel = document.getElementById('statusLabel');
        const sizeSlider = document.getElementById('sizeSlider');

        let activeColors = ["#00f2ff"]; // Array for multi-select
        let colorCounter = 0;
        let lastPos = { x: 0, y: 0 };
        let isDrawing = false;

        // Multi-Select Color Logic
        document.querySelectorAll('.swatch').forEach(swatch => {
            swatch.addEventListener('click', () => {
                const color = swatch.dataset.color;
                
                if (swatch.classList.contains('active')) {
                    // Don't deselect if it's the last one
                    if (activeColors.length > 1) {
                        swatch.classList.remove('active');
                        activeColors = activeColors.filter(c => c !== color);
                    }
                } else {
                    swatch.classList.add('active');
                    activeColors.push(color);
                }
                
                // UI feedback on status bar
                statusLabel.style.borderColor = activeColors[0];
            });
        });

        function resize() {
            drawCanvas.width = skelCanvas.width = window.innerWidth;
            drawCanvas.height = skelCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function clearCanvas() { dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height); }

        function onResults(results) {
            sctx.clearRect(0, 0, skelCanvas.width, skelCanvas.height);

            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                statusLabel.innerText = "Hand not visible";
                isDrawing = false;
                return;
            }

            for (const landmarks of results.multiHandLandmarks) {
                drawConnectors(sctx, landmarks, HAND_CONNECTIONS, {color: '#ffffff33', lineWidth: 2});
                drawLandmarks(sctx, landmarks, {color: activeColors[0], lineWidth: 1, radius: 3});

                const indexTip = landmarks[8];
                const x = indexTip.x * drawCanvas.width;
                const y = indexTip.y * drawCanvas.height;

                const isIndexExtended = landmarks[8].y < landmarks[6].y;
                const isMiddleExtended = landmarks[12].y < landmarks[10].y;
                const isPinkyExtended = landmarks[20].y < landmarks[18].y;

                if (isIndexExtended && isMiddleExtended && isPinkyExtended) {
                    statusLabel.innerText = "Mode: Eraser";
                    dctx.globalCompositeOperation = 'destination-out';
                    draw(x, y, 60); 
                } 
                else if (!isIndexExtended) {
                    statusLabel.innerText = "Mode: Paused";
                    isDrawing = false;
                }
                else {
                    statusLabel.innerText = "Mode: Drawing (Multi-Tone)";
                    dctx.globalCompositeOperation = 'source-over';
                    draw(x, y, sizeSlider.value);
                }

                lastPos = { x, y };
            }
        }

        function draw(x, y, brushSize) {
            if (!isDrawing) {
                isDrawing = true;
                lastPos = { x, y };
                return;
            }

            // Cycle through selected colors
            const currentColor = activeColors[colorCounter % activeColors.length];
            colorCounter++;

            dctx.beginPath();
            dctx.moveTo(lastPos.x, lastPos.y);
            dctx.lineTo(x, y);
            
            dctx.strokeStyle = currentColor;
            dctx.lineWidth = brushSize;
            dctx.lineCap = 'round';
            dctx.lineJoin = 'round';
            
            // Advanced Neon Glow
            dctx.shadowBlur = brushSize * 1.5;
            dctx.shadowColor = currentColor;
            
            dctx.stroke();
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        hands.onResults(onResults);

        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({image: video}); },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
