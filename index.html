<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura of Love | Air Draw</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Inter:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #0d0208;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        #ui-layer {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(40, 0, 15, 0.6);
            backdrop-filter: blur(15px);
            padding: 15px 30px;
            border-radius: 40px;
            border: 1px solid rgba(255, 105, 180, 0.3);
            display: flex;
            gap: 30px;
            align-items: center;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.2);
        }

        .label-text { font-family: 'Dancing Script', cursive; font-size: 1.4rem; color: #ff85a1; }

        canvas, video {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #video-feed { opacity: 0.1; filter: sepia(0.5) hue-rotate(-30deg); }
        
        #status-pill {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            color: #ffb3c1;
            text-shadow: 0 0 10px rgba(255, 133, 161, 0.8);
            pointer-events: none;
        }

        input[type="color"] { border: none; background: transparent; width: 35px; height: 35px; cursor: pointer; }
        input[type="range"] { accent-color: #ff4d6d; }
        button { 
            background: transparent; 
            color: #ff85a1; 
            border: 1px solid #ff85a1; 
            padding: 8px 20px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-family: 'Inter';
            transition: 0.3s;
        }
        button:hover { background: #ff85a1; color: white; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div style="display: flex; align-items: center; gap: 10px;">
            <span class="label-text">Theme Color</span>
            <input type="color" id="colorPicker" value="#ff4d6d">
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <span class="label-text">Bloom Size</span>
            <input type="range" id="sizeSlider" min="10" max="60" value="25">
        </div>
        <button id="clearBtn">Clear Memories</button>
    </div>

    <div id="status-pill">Waiting for your touch...</div>

    <video id="video-feed"></video>
    <canvas id="mainCanvas"></canvas>

    <script>
        const video = document.getElementById('video-feed');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const statusPill = document.getElementById('status-pill');
        
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class HeartParticle {
            constructor(x, y, color, size) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.color = color;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = -Math.random() * 2 - 1; // Always float upwards
                this.opacity = 1;
                this.rotation = Math.random() * Math.PI * 2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.opacity -= 0.008;
                this.rotation += 0.01;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;
                
                // Draw a small heart shape
                ctx.beginPath();
                const d = this.size;
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-d / 2, -d / 2, -d, d / 3, 0, d);
                ctx.bezierCurveTo(d, d / 3, d / 2, -d / 2, 0, 0);
                ctx.fill();
                ctx.restore();
            }
        }

        function onResults(results) {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(13, 2, 8, 0.15)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                statusPill.innerText = "Show your hand to bloom...";
                return;
            }

            const landmarks = results.multiHandLandmarks[0];
            const indexTip = landmarks[8];
            const x = indexTip.x * canvas.width;
            const y = indexTip.y * canvas.height;

            const isFist = indexTip.y > landmarks[5].y && landmarks[12].y > landmarks[9].y;
            const isOpenPalm = indexTip.y < landmarks[5].y && landmarks[20].y < landmarks[17].y;

            if (isFist) {
                statusPill.innerText = "Holding a moment...";
            } else if (isOpenPalm) {
                statusPill.innerText = "Letting go...";
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 60, 0, Math.PI * 2);
                ctx.fill();
            } else {
                statusPill.innerText = "Drawing with love...";
                let color = document.getElementById('colorPicker').value;
                
                // Frequency of hearts based on movement
                if (Math.random() > 0.2) {
                    particles.push(new HeartParticle(x, y, color, document.getElementById('sizeSlider').value / 2));
                }
            }

            particles.forEach((p, index) => {
                p.update();
                p.draw();
                if (p.opacity <= 0) particles.splice(index, 1);
            });
        }

        document.getElementById('clearBtn').onclick = () => {
            particles = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        };

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        hands.onResults(onResults);

        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({image: video}); },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
