<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Air Draw - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #ui-layer { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 15px; border: 1px solid #444; backdrop-filter: blur(10px); }
        .palette { display: flex; gap: 8px; margin-bottom: 10px; }
        .swatch { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .swatch:hover { transform: scale(1.2); }
        .swatch.active { border-color: white; }
        canvas, video { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); }
        #drawCanvas { z-index: 2; }
        #skeletonCanvas { z-index: 3; pointer-events: none; } /* Hand skeleton layer */
        video { z-index: 1; opacity: 0.2; }
        .info { position: absolute; bottom: 20px; width: 100%; text-align: center; z-index: 100; font-weight: bold; text-shadow: 0 0 10px #000; }
        input[type="range"] { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="palette" id="palette">
            <div class="swatch active" style="background: #00f2ff;" data-color="#00f2ff"></div>
            <div class="swatch" style="background: #ff007b;" data-color="#ff007b"></div>
            <div class="swatch" style="background: #00ff40;" data-color="#00ff40"></div>
            <div class="swatch" style="background: #ffff00;" data-color="#ffff00"></div>
            <div class="swatch" style="background: #ffffff;" data-color="#ffffff"></div>
        </div>
        <input type="range" id="sizeSlider" min="2" max="25" value="6">
        <button onclick="clearCanvas()" style="width:100%; margin-top:10px; background:#444; color:white; border:none; padding:5px; border-radius:5px; cursor:pointer;">CLEAR ALL</button>
    </div>

    <div class="info" id="status">WAITING FOR CAMERA...</div>

    <video id="inputVideo" playsinline></video>
    <canvas id="drawCanvas"></canvas>
    <canvas id="skeletonCanvas"></canvas>

    <script>
        const video = document.getElementById('inputVideo');
        const drawCanvas = document.getElementById('drawCanvas');
        const skelCanvas = document.getElementById('skeletonCanvas');
        const dctx = drawCanvas.getContext('2d');
        const sctx = skelCanvas.getContext('2d');
        const status = document.getElementById('status');
        
        let currentColor = "#00f2ff";
        let lastX = 0, lastY = 0, isDrawing = false;

        // Swatch Logic
        document.querySelectorAll('.swatch').forEach(s => {
            s.onclick = (e) => {
                document.querySelectorAll('.swatch').forEach(sw => sw.classList.remove('active'));
                s.classList.add('active');
                currentColor = s.dataset.color;
            };
        });

        function resize() {
            drawCanvas.width = skelCanvas.width = window.innerWidth;
            drawCanvas.height = skelCanvas.height = window.innerHeight;
        }
        window.onresize = resize; resize();

        function clearCanvas() { dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height); }

        function onResults(results) {
            sctx.clearRect(0, 0, skelCanvas.width, skelCanvas.height);

            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                status.innerText = "NO HAND DETECTED";
                isDrawing = false;
                return;
            }

            for (const landmarks of results.multiHandLandmarks) {
                // Draw the skeleton as requested
                drawConnectors(sctx, landmarks, HAND_CONNECTIONS, {color: '#ffffff', lineWidth: 2});
                drawLandmarks(sctx, landmarks, {color: currentColor, lineWidth: 1, radius: 3});

                const indexTip = landmarks[8];
                const x = indexTip.x * drawCanvas.width;
                const y = indexTip.y * drawCanvas.height;

                // Gesture detection logic from 99349.jpg
                const isIndexUp = landmarks[8].y < landmarks[6].y;
                const isPalm = landmarks[12].y < landmarks[9].y && landmarks[20].y < landmarks[17].y;
                const isFist = landmarks[8].y > landmarks[5].y && landmarks[12].y > landmarks[9].y;

                if (isFist) {
                    status.innerText = "PAUSED (FIST)";
                    isDrawing = false;
                } else if (isPalm) {
                    status.innerText = "ERASING (PALM)";
                    dctx.globalCompositeOperation = 'destination-out';
                    draw(x, y, 40);
                } else if (isIndexUp) {
                    status.innerText = "DRAWING (INDEX)";
                    dctx.globalCompositeOperation = 'source-over';
                    draw(x, y, document.getElementById('sizeSlider').value);
                }
                lastX = x; lastY = y;
            }
        }

        function draw(x, y, size) {
            if (!isDrawing) { isDrawing = true; lastX = x; lastY = y; return; }
            dctx.beginPath();
            dctx.moveTo(lastX, lastY);
            dctx.lineTo(x, y);
            dctx.strokeStyle = currentColor;
            dctx.lineWidth = size;
            dctx.lineCap = 'round';
            dctx.shadowBlur = 10;
            dctx.shadowColor = currentColor;
            dctx.stroke();
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({image: video}); },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
