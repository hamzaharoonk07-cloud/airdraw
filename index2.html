<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Air Draw</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #controls {
            position: absolute;
            top: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            display: flex;
            gap: 20px;
            align-items: center;
            border: 1px solid #333;
        }

        .canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas, video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror effect */
        }

        #drawingCanvas {
            z-index: 2;
        }

        #status {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: none;
        }

        input[type="color"] {
            border: none;
            width: 40px;
            height: 40px;
            cursor: pointer;
            background: none;
        }
    </style>
</head>
<body>

    <div id="controls">
        <label>Color: <input type="color" id="colorPicker" value="#00f2ff"></label>
        <label>Size: <input type="range" id="sizeSlider" min="1" max="50" value="8"></label>
        <button id="clearBtn" style="padding: 5px 15px; cursor: pointer;">Clear Canvas</button>
    </div>

    <div id="status">Loading AI...</div>

    <div class="canvas-container">
        <video id="inputVideo" style="opacity: 0.3;"></video>
        <canvas id="drawingCanvas"></canvas>
    </div>

    <script>
        const video = document.getElementById('inputVideo');
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const colorPicker = document.getElementById('colorPicker');
        const sizeSlider = document.getElementById('sizeSlider');
        const clearBtn = document.getElementById('clearBtn');

        let lastX = 0;
        let lastY = 0;
        let isDrawing = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        clearBtn.onclick = () => ctx.clearRect(0, 0, canvas.width, canvas.height);

        function onResults(results) {
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                status.innerText = "No hand detected";
                isDrawing = false;
                return;
            }

            const landmarks = results.multiHandLandmarks[0];
            
            // Key points for gesture recognition
            const indexTip = landmarks[8];
            const indexPip = landmarks[6];
            const middleTip = landmarks[12];
            const thumbTip = landmarks[4];
            const pinkyTip = landmarks[20];

            // Map normalized coordinates to canvas
            const x = indexTip.x * canvas.width;
            const y = indexTip.y * canvas.height;

            // Gesture Logic
            const isIndexUp = indexTip.y < indexPip.y;
            const isFist = indexTip.y > landmarks[5].y && middleTip.y > landmarks[9].y && pinkyTip.y > landmarks[17].y;
            const isOpenPalm = indexTip.y < landmarks[5].y && pinkyTip.y < landmarks[17].y && middleTip.y < landmarks[9].y;

            if (isFist) {
                status.innerText = "PAUSED";
                status.style.color = "orange";
                isDrawing = false;
            } else if (isOpenPalm) {
                status.innerText = "ERASING";
                status.style.color = "red";
                ctx.globalCompositeOperation = 'destination-out';
                draw(x, y, parseInt(sizeSlider.value) * 2);
            } else if (isIndexUp) {
                status.innerText = "DRAWING";
                status.style.color = "#00f2ff";
                ctx.globalCompositeOperation = 'source-over';
                draw(x, y, sizeSlider.value);
            }

            lastX = x;
            lastY = y;
        }

        function draw(x, y, size) {
            if (!isDrawing) {
                isDrawing = true;
                lastX = x;
                lastY = y;
                return;
            }

            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            
            ctx.strokeStyle = colorPicker.value;
            ctx.lineWidth = size;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            // Neon Glow Effect
            ctx.shadowBlur = 15;
            ctx.shadowColor = colorPicker.value;
            
            ctx.stroke();
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        const camera = new Camera(video, {
            onFrame: async () => {
                await hands.send({image: video});
            },
            width: 1280,
            height: 720
        });

        camera.start();
    </script>
</body>
</html>
